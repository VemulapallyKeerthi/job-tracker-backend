name: Daily Job Scraper

on:
  schedule:
    - cron: '0 10 * * *'  # Every day at 10:00 AM UTC (6AM ET / 3AM PT)
  workflow_dispatch:       # Allow manual trigger from GitHub Actions UI

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Wake up Render service
        run: |
          echo "Pinging Render to wake up..."
          curl -s https://job-tracker-backend-hrdi.onrender.com/ || true
          sleep 30  # Wait 30 seconds for Render to fully wake up

      - name: Trigger scraper
        env:
          SEARCH_QUERIES: "data scientist,machine learning engineer,data engineer,ML engineer,AI engineer,deep learning engineer,NLP engineer,computer vision engineer,data analyst,research scientist,applied scientist,quantitative analyst,business intelligence analyst,data science manager,MLOps engineer"
          SEARCH_LOCATIONS: "Remote,New York NY,San Francisco CA,Seattle WA,Austin TX,Boston MA,Chicago IL"
        run: |
          echo "Triggering scraper..."
          curl -s -X POST https://job-tracker-backend-hrdi.onrender.com/scrape
          echo ""
          echo "✅ Scraper triggered in background — running on Render"
          sleep 10

      - name: Done
        run: |
          echo "✅ Workflow complete. Scraper is running in background on Render."
          echo "Check Render logs for scraper progress."
